<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skyline — Weather Dashboard</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="sky"></div>
<div id="particles"></div>

<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Skyline</div>
  </div>

  <div class="search-panel" id="searchPanel">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F7F9FC" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search any city or place…" autocomplete="off">
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div id="msgArea"></div>

  <div class="hero" id="hero">
    <div class="hero-top">
      <div>
        <div class="hero-loc" id="heroLoc">—</div>
        <div class="hero-date" id="heroDate">—</div>
      </div>
      <div id="heroIcon" class="hero-icon"></div>
    </div>
    <div class="hero-mid">
      <div class="hero-temp" id="heroTemp">--°</div>
      <div class="hero-desc" id="heroDesc">—</div>
    </div>
    <div class="hero-feels" id="heroFeels">—</div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-tile"><div class="stat-label">Humidity</div><div class="stat-value" id="statHumidity">—</div></div>
    <div class="stat-tile"><div class="stat-label">Wind</div><div class="stat-value" id="statWind">—</div></div>
    <div class="stat-tile"><div class="stat-label">Pressure</div><div class="stat-value" id="statPressure">—</div></div>
    <div class="stat-tile"><div class="stat-label">Visibility</div><div class="stat-value" id="statVisibility">—</div></div>
  </div>

  <div class="forecast-title" id="forecastTitle">5-day forecast</div>
  <div class="forecast-row" id="forecastRow"></div>
</div>

<script src="./script.js"></script>

</body>
</html>
